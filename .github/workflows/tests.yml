name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Windows-first project: CI mirrors the primary supported platform.
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Fetch pinned tdl binary
        shell: pwsh
        run: ./scripts/fetch_tdl.ps1

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run test suite
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: uv run pytest tests/ -q
