{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-md">
    <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-8">
        <div class="flex items-center gap-3 mb-4">
            <i data-lucide="lock" class="w-6 h-6 text-accent-400"></i>
            <h1 class="text-2xl font-semibold">Вход</h1>
        </div>
        <p class="text-sm text-slate-400 mb-6">
            Введите мастер-пароль для расшифровки хранилища.
        </p>

        {% if error %}
        <div class="mb-4 rounded-lg border border-red-900/50 bg-red-950/40 p-3 text-sm text-red-300">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login" class="space-y-4">
            <label class="block">
                <span class="text-sm text-slate-300">Мастер-пароль</span>
                <input type="password" name="password" required autofocus
                       class="mt-1 block w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2 text-slate-100 focus:border-accent-500 focus:outline-none" />
            </label>
            <button type="submit"
                    class="w-full rounded-xl bg-accent-600 hover:bg-accent-500 py-2 font-medium transition">
                Войти
            </button>
        </form>
    </div>
</div>
{% endblock %}
