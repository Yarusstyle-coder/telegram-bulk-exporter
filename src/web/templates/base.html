<!doctype html>
<html lang="ru" class="h-full">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ title or "Telegram Bulk Exporter" }}{% endblock %}</title>

    <!-- Tailwind via Play CDN (no build step) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: {
                            50:  '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe',
                            300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6',
                            600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af',
                            900: '#1e3a8a',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%':   { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                    },
                },
            },
        };
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
    <script src="https://unpkg.com/htmx.org@2.0.3/dist/ext/ws.js" defer></script>

    <!-- Alpine.js -->
    <script src="https://unpkg.com/alpinejs@3.14.1" defer></script>

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>

    <!-- Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <style>
        html { color-scheme: dark; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        [x-cloak] { display: none !important; }
    </style>

    {% block head_extra %}{% endblock %}
</head>
<body class="h-full bg-slate-950 text-slate-100 antialiased">
    <div class="min-h-full flex flex-col">
        <header class="border-b border-slate-800 bg-slate-900/60 backdrop-blur">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
                <a href="/" class="flex items-center gap-2 font-semibold">
                    <i data-lucide="send" class="w-5 h-5 text-accent-400"></i>
                    <span>Telegram&nbsp;Bulk&nbsp;Exporter</span>
                </a>
                <nav class="flex items-center gap-4 text-sm">
                    <a href="/chats"  class="hover:text-accent-300">Чаты</a>
                    <a href="/jobs"   class="hover:text-accent-300">Задачи</a>
                    <a href="/proxy"  class="hover:text-accent-300">Прокси</a>
                    <a href="/auth/telegram" class="hover:text-accent-300">Telegram</a>
                    {% block header_extra %}{% endblock %}
                </nav>
            </div>
        </header>

        <main class="flex-1">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-6">
                {% block content %}{% endblock %}
            </div>
        </main>

        <footer class="border-t border-slate-800 py-4 text-center text-xs text-slate-500">
            Все данные шифруются локально (AES-256-GCM). Ключ существует только в памяти этой сессии.
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();
        });
        document.body.addEventListener('htmx:afterSwap', () => {
            if (window.lucide) window.lucide.createIcons();
        });
    </script>
    {% block body_extra %}{% endblock %}
</body>
</html>
